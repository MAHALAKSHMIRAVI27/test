trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'   # change if inside folder
    goals: 'package'
    mavenOptions: '-Xmx1024m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'